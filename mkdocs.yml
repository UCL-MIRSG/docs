---
site_name: UCL ARC MIRSG Docs
site_url: https://ucl-mirsg.github.io/docs/
site_author: UCL ARC MIRSG
site_description:
  Documentation for the UCL ARC Collaborations - Medical Imaging (MIRSG) group

repo_name: UCL-MIRSG/docs
repo_url: https://github.com/UCL-MIRSG/docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#instant-loading
    - navigation.tracking # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#anchor-tracking
    - navigation.tabs # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#navigation-tabs
    - navigation.sections # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#navigation-sections
    - navigation.indexes # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#section-index-pages
    - toc.follow # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#anchor-following
    - toc.integrate # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#navigation-integration
    - navigation.top # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#back-to-top-button
    - search.suggest # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/#search-suggestions
    - search.highlight # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/#search-highlighting
    - search.share # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/#search-sharing
    - header.autohide # https://squidfunk.github.io/mkdocs-material/setup/setting-up-the-header/#automatic-hiding
    - content.action.edit # https://squidfunk.github.io/mkdocs-material/setup/adding-a-git-repository/#code-actions
  icon:
    edit: material/pencil
    view: material/eye
  palette:
    # Palette toggle for light mode
    - media:
        prefers-color-scheme: light
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media:
        prefers-color-scheme: dark
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - privacy

copyright: >
  Copyright &copy; 2025 UCL ARC MIRSG – <a href="#__consent">Change cookie
  settings</a>

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UCL-ARC
  consent:
    github:
    actions:
      - reject
      - manage
      - accept
    title: Local storage notification
    description: >-
      We don't use cookies at all, but we do use your browser's local storage to
      remember whether you prefer dark or light mode, and to store the GitHub
      statistics displayed in the top-right. You can disable the stats retrieval
      to GitHub and associated storage here.
